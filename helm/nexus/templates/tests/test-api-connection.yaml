apiVersion: v1
kind: Pod
metadata:
  name: {{ include "nexus.fullname" . }}-test-api
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:latest
      command:
        - sh
        - -c
        - |
          echo "Testing API health endpoint..."
          curl -sf http://{{ include "nexus.fullname" . }}-api:8000/api/v1/health || exit 1
          echo "API health check passed."
