{{- if .Values.neo4j.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexus.fullname" . }}-neo4j
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  type: ClusterIP
  ports:
    - port: 7687
      targetPort: bolt
      protocol: TCP
      name: bolt
    - port: 7474
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "nexus.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
{{- end }}
