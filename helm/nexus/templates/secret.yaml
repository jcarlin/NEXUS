apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nexus.fullname" . }}-secret
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
type: Opaque
data:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  GEMINI_API_KEY: {{ .Values.secrets.geminiApiKey | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  NEO4J_PASSWORD: {{ .Values.secrets.neo4jPassword | b64enc | quote }}
  MINIO_ACCESS_KEY: {{ .Values.secrets.minioAccessKey | b64enc | quote }}
  MINIO_SECRET_KEY: {{ .Values.secrets.minioSecretKey | b64enc | quote }}
  JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | b64enc | quote }}
  FLOWER_USER: {{ .Values.secrets.flowerUser | b64enc | quote }}
  FLOWER_PASSWORD: {{ .Values.secrets.flowerPassword | b64enc | quote }}
  LANGCHAIN_API_KEY: {{ .Values.secrets.langchainApiKey | b64enc | quote }}
  OIDC_CLIENT_ID: {{ .Values.secrets.oidcClientId | b64enc | quote }}
  OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | b64enc | quote }}
  GDRIVE_CLIENT_ID: {{ .Values.secrets.gdriveClientId | b64enc | quote }}
  GDRIVE_CLIENT_SECRET: {{ .Values.secrets.gdriveClientSecret | b64enc | quote }}
  GDRIVE_ENCRYPTION_KEY: {{ .Values.secrets.gdriveEncryptionKey | b64enc | quote }}
