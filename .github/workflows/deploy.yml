name: Deploy to GCP

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy via SSH
        uses: google-github-actions/ssh-compute@v1
        with:
          instance_name: ${{ vars.GCE_INSTANCE }}
          zone: ${{ vars.GCE_ZONE }}
          command: |
            set -euo pipefail
            cd ~/nexus

            # Pull latest code
            git fetch origin main
            git checkout origin/main

            # Pull latest infrastructure images (picks up version changes in docker-compose.yml)
            sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.cloud.yml pull

            # Rebuild and restart application services
            sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.cloud.yml up -d --build api worker beat

            # Run any pending migrations
            sudo docker compose exec -T api alembic upgrade head

            # Wait for health check
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi
              sleep 2
            done
            echo "Health check failed after 60s"
            sudo docker compose logs --tail=50 api
            exit 1
