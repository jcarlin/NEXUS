name: Evaluation Dry Run

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "evaluation/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "evaluation/**"
      - "scripts/**"

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run evaluation dry run
        run: uv run python scripts/evaluate.py --dry-run
