name: Evaluation Dry Run

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "evaluation/**"
      - "scripts/**"
      - "migrations/**"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "evaluation/**"
      - "scripts/**"
      - "migrations/**"

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run evaluation dry run
        run: uv run python scripts/evaluate.py --dry-run --output eval-results.json

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval-results.json
          retention-days: 30

      - name: Post evaluation metrics to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Evaluation Results\n\n';
            try {
              const results = JSON.parse(fs.readFileSync('eval-results.json', 'utf8'));
              const passed = results.passed ? '✅ PASSED' : '❌ FAILED';
              body += `**Status**: ${passed}\n\n`;

              if (results.retrieval && results.retrieval.length > 0) {
                body += '### Retrieval Metrics\n\n';
                body += '| Mode | MRR@10 | Recall@10 | NDCG@10 | Precision@10 |\n';
                body += '|------|--------|-----------|---------|-------------|\n';
                for (const r of results.retrieval) {
                  body += `| ${r.mode} | ${r.mrr_at_10.toFixed(4)} | ${r.recall_at_10.toFixed(4)} | ${r.ndcg_at_10.toFixed(4)} | ${r.precision_at_10.toFixed(4)} |\n`;
                }
                body += '\n';
              }

              if (results.adversarial_summary) {
                const adv = results.adversarial_summary;
                body += `### Adversarial Tests\n\n`;
                body += `**${adv.passed}/${adv.total}** passed (${(adv.pass_rate * 100).toFixed(0)}%)\n\n`;
              }

              if (results.gate_failures && results.gate_failures.length > 0) {
                body += '### Gate Failures\n\n';
                for (const f of results.gate_failures) {
                  body += `- ❌ ${f}\n`;
                }
              }
            } catch (e) {
              body += `⚠️ Could not parse eval-results.json: ${e.message}\n`;
            }

            body += '\n---\n*Generated by evaluation dry run*';

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.body.includes('## Evaluation Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
