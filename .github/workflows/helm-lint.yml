name: Helm Lint
on:
  pull_request:
    paths: ['helm/**']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm lint
        run: helm lint helm/nexus/
      - name: Helm template (default values)
        run: helm template nexus helm/nexus/
      - name: Helm template (dev values)
        run: helm template nexus helm/nexus/ --values helm/nexus/values-dev.yaml
      - name: Helm template (staging values)
        run: helm template nexus helm/nexus/ --values helm/nexus/values-staging.yaml
      - name: Helm template (prod values)
        run: helm template nexus helm/nexus/ --values helm/nexus/values-prod.yaml
