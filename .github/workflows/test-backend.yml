name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "workers/**"
      - "pyproject.toml"
      - "evaluation/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "workers/**"
      - "pyproject.toml"
      - "evaluation/**"
      - "scripts/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v -n auto --tb=short
