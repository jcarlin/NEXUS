name: VM Control

on:
  workflow_dispatch:
    inputs:
      action:
        description: Action to perform
        required: true
        type: choice
        options:
          - start
          - stop
          - status

jobs:
  vm-control:
    name: "${{ inputs.action }} nexus-gpu"
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: "${{ inputs.action }} VM"
        run: |
          set -euo pipefail
          case "${{ inputs.action }}" in
            start)
              gcloud compute instances start nexus-gpu --zone=us-west1-a --project=vault-ai-487703
              echo "Waiting for VM to be reachable..."
              sleep 30
              gcloud compute instances describe nexus-gpu --zone=us-west1-a --project=vault-ai-487703 \
                --format="table(name,status,networkInterfaces[0].accessConfigs[0].natIP)"
              ;;
            stop)
              gcloud compute instances stop nexus-gpu --zone=us-west1-a --project=vault-ai-487703
              ;;
            status)
              gcloud compute instances describe nexus-gpu --zone=us-west1-a --project=vault-ai-487703 \
                --format="table(name,status,networkInterfaces[0].accessConfigs[0].natIP,scheduling.preemptible)"
              ;;
          esac
