<!doctype html>
<html lang="en" class="dark" style="background-color: oklch(0.145 0.004 260)">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXUS — Legal Document Intelligence</title>
    <script>
      (function() {
        var t = localStorage.getItem('nexus-theme') || 'system';
        var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.className = dark ? 'dark' : 'light';
        if (!dark) document.documentElement.style.backgroundColor = '';
      })();
    </script>
  </head>
  <body class="min-h-screen bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
