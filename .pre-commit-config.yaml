repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: tsc-frontend
        name: tsc-frontend
        entry: bash -c 'cd frontend && npx tsc -p tsconfig.app.json --noEmit'
        language: system
        files: ^frontend/src/.*\.tsx?$
        pass_filenames: false
