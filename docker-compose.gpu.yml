# GPU overlay — layer on top of the base + prod + cloud compose files.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#          -f docker-compose.cloud.yml -f docker-compose.gpu.yml up -d
#
# Requires:
#   - NVIDIA GPU driver on the host
#   - NVIDIA Container Toolkit (nvidia-ctk)
#   - Docker configured with nvidia runtime

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  tei-embedder:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    command: --model-id ${TEI_EMBEDDING_MODEL:-BAAI/bge-m3} --port 8081
    ports:
      - "8081:8081"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - tei-models:/data
    restart: unless-stopped

volumes:
  tei-models:
