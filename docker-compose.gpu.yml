# GPU overlay — layer on top of the base + prod + cloud compose files.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#          -f docker-compose.cloud.yml -f docker-compose.gpu.yml up -d
#
# Requires:
#   - NVIDIA GPU driver on the host
#   - NVIDIA Container Toolkit (nvidia-ctk)
#   - Docker configured with nvidia runtime

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  tei-embedder:
    image: ghcr.io/huggingface/text-embeddings-inference:turing-1.9
    ports:
      - "8081:80"
    environment:
      MODEL_ID: ${TEI_EMBEDDING_MODEL:-BAAI/bge-m3}
      # Flash Attention off by default for Turing (precision issues on T4).
      # For Ampere+ (A100/L4), switch to the :1.9 image and enable flash attn.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - tei-models:/data
    restart: unless-stopped

volumes:
  tei-models:
