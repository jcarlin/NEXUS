# GPU overlay — layer on top of the base + prod + cloud compose files.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#          -f docker-compose.cloud.yml -f docker-compose.gpu.yml up -d
#
# Requires:
#   - NVIDIA GPU driver on the host
#   - NVIDIA Container Toolkit (nvidia-ctk)
#   - Docker configured with nvidia runtime

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  worker:
    command: celery -A workers.celery_app worker -Q default,bulk,background -l info -c ${CELERY_CONCURRENCY:-2} --pool=prefork --max-tasks-per-child=100

  ner-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A workers.celery_app worker -Q ner -l info -c ${NER_WORKER_CONCURRENCY:-6} --pool=prefork --max-tasks-per-child=50
    env_file: .env
    environment:
      # Must match docker-compose.prod.yml worker environment (Docker service names)
      POSTGRES_URL: postgresql+asyncpg://nexus:${POSTGRES_PASSWORD}@postgres:5432/nexus
      POSTGRES_URL_SYNC: postgresql://nexus:${POSTGRES_PASSWORD}@postgres:5432/nexus
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://nexus:${RABBITMQ_PASSWORD:-nexus}@rabbitmq:5672/nexus
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      MINIO_ENDPOINT: minio:9000
      OLLAMA_BASE_URL: http://ollama:11434
    deploy:
      resources:
        limits:
          memory: 8G
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  infinity:
    image: michaelf34/infinity:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      INFINITY_MODEL_ID: "${INFINITY_EMBEDDING_MODEL:-BAAI/bge-m3};${INFINITY_RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}"
      INFINITY_BATCH_SIZE: "128;32"
      INFINITY_ENGINE: "torch;torch"
      INFINITY_DEVICE: "cuda;cuda"
      INFINITY_DTYPE: "float16;float16"
      INFINITY_PORT: "7997"
    ports:
      - "7997:7997"
    volumes:
      - infinity-models:/app/.cache
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-14B-Instruct-AWQ}
      --quantization awq
      --max-model-len ${VLLM_MAX_MODEL_LEN:-8192}
      --gpu-memory-utilization 0.6
      --trust-remote-code
    ports:
      - "8080:8000"
    volumes:
      - vllm-models:/root/.cache/huggingface
    restart: unless-stopped
    profiles:
      - vllm

volumes:
  infinity-models:
  vllm-models:
