# docker-compose.cloud.yml — Cloud overlay (adds Caddy reverse proxy + TLS)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.cloud.yml up -d
#
# Note: API/MinIO host ports from base compose files are still bound but
# unexposed — the GCP firewall only allows 80/443. Caddy handles all external traffic.

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
