# docker-compose.cloud.yml — Cloud overlay (adds Caddy reverse proxy + TLS)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.cloud.yml up -d
#
# Security: Removes all host port bindings except 80/443 (Caddy).
# Infrastructure services communicate via Docker network only.
# Requires Docker Compose v2.24.0+ for !override syntax.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  # --- Port overrides: keep API on 8000 (Vercel rewrites), remove all others ---
  api:
    logging: *default-logging
    healthcheck:
      start_period: 180s
      retries: 10

  worker:
    logging: *default-logging

  flower:
    ports: !override []
    logging: *default-logging

  postgres:
    ports: !override []
    logging: *default-logging

  redis:
    ports: !override []
    logging: *default-logging

  qdrant:
    ports: !override []
    logging: *default-logging

  neo4j:
    ports: !override []
    logging: *default-logging

  minio:
    ports: !override []
    logging: *default-logging

volumes:
  caddy_data:
  caddy_config:
