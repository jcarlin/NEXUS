# docker-compose.cloud.yml — Cloud overlay (adds Caddy reverse proxy + TLS)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.cloud.yml up -d
#
# Security: Removes all host port bindings except 80/443 (Caddy).
# Infrastructure services communicate via Docker network only.
# Requires Docker Compose v2.24.0+ for !override syntax.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M

  # --- Port overrides: remove host bindings for all internal services ---
  api:
    ports: !override []
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '0.5'

  worker:
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '0.5'

  flower:
    ports: !override []
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    ports: !override []
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1024M

  redis:
    ports: !override []
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M

  qdrant:
    ports: !override []
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1536M

  neo4j:
    ports: !override []
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1536M

  minio:
    ports: !override []
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  caddy_data:
  caddy_config:
