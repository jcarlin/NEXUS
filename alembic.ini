# Alembic configuration for NEXUS
# The sqlalchemy.url is overridden at runtime by migrations/env.py
# which reads from app.config.Settings (POSTGRES_URL_SYNC env var).

[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = postgresql://nexus:changeme@localhost:5432/nexus

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
